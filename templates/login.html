<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="content">

        <div class="card">

            <h1>User Login</h1>

            <br>

            <!-- PASSWORD LOGIN -->

            <form method="POST" action="/login">

                <input type="text"
                name="username"
                placeholder="Username"
                required>

                <br><br>

                <input type="password"
                name="password"
                placeholder="Password"
                required>

                <br><br>

                <button type="submit">
                    Login with Password
                </button>

            </form>

            <br><hr><br>

            <!-- OTP LOGIN -->

            <form method="POST" action="/send_login_otp">

                <input type="email"
                name="email"
                placeholder="Enter Email for OTP"
                required>

                <br><br>

                <button type="submit">
                    Send OTP
</html>
