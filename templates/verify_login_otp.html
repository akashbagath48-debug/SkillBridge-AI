<!DOCTYPE html>
<html>
<head>

    <title>Verify Login OTP</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="content">

        <div class="card">

            <h1>Verify Login OTP</h1>

            <br>

            <form method="POST">

                <input type="text"
                name="otp"
                placeholder="Enter OTP"
                required>

                <br><br>

                <button type="submit">
                    Verify OTP
                </button>

            </form>

        </div>

    </div>

</body>
</html>
