<!DOCTYPE html>
<html>
<head>

    <title>AI Chatbot</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="container">

        <h1>SkillBridge AI Chatbot</h1>

        <form method="POST">

            <input type="text"
            name="message"
            placeholder="Ask something..."
            required>

            <br><br>

            <button type="submit">
                Send
            </button>

        </form>

        <br>

        {% if user_message %}

            <h2>You:</h2>

            <p>{{ user_message }}</p>

            <h2>Bot:</h2>

            <p>{{ bot_response }}</p>

        {% endif %}

    </div>

</body>
</html>
